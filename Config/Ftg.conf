config user local
    edit "estudiante_20230331"
        set type password
        set passwd fortinet2023
    next
end

config user group
    edit "VPN_SSL_Users"
        set member "estudiante_20230331"
    next
end

config firewall address
    edit "SSL_VPN_Pool_20230331"
        set type iprange
        set start-ip 10.10.31.10
        set end-ip 10.10.31.50
    next
    edit "LAN1_Network"
        set subnet 192.168.31.0 255.255.255.0
    next
    edit "LAN2_Network"
        set subnet 192.168.32.0 255.255.255.0
    next
end

# --- CONFIGURACIÓN SSL-VPN ---
config vpn ssl web portal
    edit "full-access"
        set split-tunneling disable
        set ip-pools "SSL_VPN_Pool_20230331"
    next
end

config vpn ssl settings
    set servercert "Fortinet_Factory"
    set tunnel-ip-pools "SSL_VPN_Pool_20230331"
    set source-interface "port1"
    set source-address "all"
    set default-portal "full-access"
    config authentication-rule
        edit 1
            set groups "VPN_SSL_Users"
            set portal "full-access"
        next
    end
end

# --- POLÍTICAS DE FIREWALL (CLIENT-TO-SITE & INTER-LAN) ---
config firewall policy
    edit 1
        set name "VPN_to_LAN1"
        set srcintf "ssl.root"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set groups "VPN_SSL_Users"
    next
    edit 2
        set name "VPN_to_LAN2"
        set srcintf "ssl.root"
        set dstintf "port3"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set groups "VPN_SSL_Users"
    next
    edit 3
        set name "LAN1_to_LAN2_via_VPN"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "LAN1_Network"
        set dstaddr "LAN2_Network"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
